name: Auto Create PR

on:
  push:
    branches:
      - 'feature/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Create Pull Request via API
        run: |
          gh pr create \
            --base "main" \
            --head "${{ github.ref_name }}" \
            --title "Auto PR - ${{ github.ref_name }}" \
            --body "PR criado automaticamente da branch ${{ github.ref_name }}."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}