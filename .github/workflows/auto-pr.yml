name: Auto Create PR

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches:
      - 'feature/**'

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Create Pull Request via API
        run: |
          gh pr create \
            --base main \
            --head ${{ github.ref_name }} \
            --title "Auto PR - ${{ github.ref_name }}" \
            --body "PR criado automaticamente."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}